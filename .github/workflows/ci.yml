name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  quality:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Next.js build
        # Dummy env vars so Prisma client init, better-auth, and lib/stripe.ts
        # do not fail at build-time. We do not need a real DB or real API keys;
        # all auth-gated routes are force-dynamic so the build never runs
        # actual queries, and public routes that import lib/stripe.ts only need
        # STRIPE_SECRET_KEY to exist at module-evaluation time.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          # Unused at build-time (no migrations run) but declared in
          # prisma/schema.prisma as env("DIRECT_URL"), so Prisma requires it
          # to be defined to parse the schema.
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-only-secret-not-used
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_dummy_not_used
        run: npm run build

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brandbite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brandbite_test
      # CI Postgres is a direct connection (no pooler), so point DIRECT_URL
      # at the same URL. Required because prisma/schema.prisma declares
      # `directUrl = env("DIRECT_URL")`.
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/brandbite_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Dry-run the exact same migrate deploy the Vercel production build
      # runs. A PR that breaks a migration (SQL syntax error, referenced
      # column missing, FK pointing at a deleted table, etc.) fails this
      # step instead of the production deploy. Previously disabled while
      # prisma/migrations was incomplete — unblocked by the squash
      # baseline landed alongside this change.
      - name: Dry-run prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Run integration tests
        run: npm run test:integration
